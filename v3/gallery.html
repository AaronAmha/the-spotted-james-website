<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Photos &amp; Gallery | The Spotted James — Boulder Bar Nights</title>
<meta name="description" content="See The Spotted James in photos — DJ sets, dance floor nights, wedding parties, bachelorette groups, CU students, and post-game Buffs crowds. Tag @thespottedjames to get featured." />
<meta name="keywords" content="Boulder bar photos, Boulder nightlife photos, The Spotted James Instagram, CU Boulder party photos, Pearl Street bar photos" />
<meta name="robots" content="index, follow" />
<meta name="theme-color" content="#000000" />
<link rel="canonical" href="https://thespottedjames.com/gallery.html" />

<meta name="geo.region" content="US-CO" />
<meta name="geo.placename" content="Boulder, Colorado" />
<meta name="geo.position" content="40.0167;-105.2786" />

<meta property="og:type" content="website" />
<meta property="og:title" content="The Spotted James — Photo Gallery" />
<meta property="og:description" content="The night, captured. Tag @thespottedjames to get featured." />
<meta property="og:url" content="https://thespottedjames.com/gallery.html" />
<meta property="og:image" content="https://thespottedjames.com/assets/horse-logo.jpg" />

<link rel="icon" type="image/svg+xml" href="assets/horseshoe.svg" />
<link rel="icon" type="image/png" sizes="96x96" href="assets/horseshoe-96.png" />
<link rel="apple-touch-icon" sizes="256x256" href="assets/horseshoe-256.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="nav">
  <a href="index.html" class="nav__brand" aria-label="The Spotted James home">
    <img src="assets/horse-logo.jpg" class="nav__brand-mark" alt="The Spotted James logo" />
  </a>
  <nav aria-label="primary">
    <ul class="nav__menu">
      <li><a href="index.html">Events</a></li>
      <li><a href="drinks.html">Drinks</a></li>
      <li><a href="parties.html">Private Parties</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>
  <a href="directions.html" class="nav__cta">Get Directions</a>
</header>

<main class="page">
  <section>
    <h1 class="page__title">GALLERY</h1>
    <p class="page__subtitle">The Night, Captured.</p>
    <p class="page__lead">From CU students to wedding parties to first-time visitors —<br/>tag @thespottedjames to get featured.</p>

    <div class="gallery-filters">
      <button class="gallery-filter active" data-filter="all">All</button>
      <button class="gallery-filter" data-filter="spotted">Spotted</button>
      <button class="gallery-filter" data-filter="nights">Nights</button>
      <button class="gallery-filter" data-filter="friends">Friends</button>
      <button class="gallery-filter" data-filter="djs">DJ's</button>
    </div>
  </section>

  <aside>
    <div class="gallery-grid">
      <div class="gallery-tile gtile-1" data-cat="spotted"></div>
      <div class="gallery-tile gtile-2" data-cat="nights"></div>
      <div class="gallery-tile gtile-3" data-cat="friends"></div>
      <div class="gallery-tile gtile-4" data-cat="djs"></div>
      <div class="gallery-tile gtile-5" data-cat="nights"></div>
      <div class="gallery-tile gtile-6" data-cat="spotted"></div>
      <div class="gallery-tile gtile-7" data-cat="friends"></div>
      <div class="gallery-tile gtile-8" data-cat="djs"></div>
      <div class="gallery-tile gtile-9" data-cat="nights"></div>
    </div>
    <div class="gallery-load">
      <button class="btn" id="loadMore">Load More</button>
    </div>
  </aside>
</main>

<script>
  document.querySelectorAll('.gallery-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gallery-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      document.querySelectorAll('.gallery-tile').forEach(t => {
        t.style.display = (f === 'all' || t.dataset.cat === f) ? '' : 'none';
      });
    });
  });
</script>
</body>
</html>
