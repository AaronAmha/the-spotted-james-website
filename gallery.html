<main id="main" class="page">

    <h1 class="page__title">GALLERY</h1>
    <p class="page__subtitle">The Night, Captured.</p>
    <p class="page__lead">Tag @thespottedjames to get<br/>featured.</p>

    <div class="gallery-filters">
      <button class="gallery-filter active" aria-pressed="true" data-filter="all">All</button>
      <button class="gallery-filter" aria-pressed="false" data-filter="spotted">Spotted</button>
      <button class="gallery-filter" aria-pressed="false" data-filter="nights">Nights</button>
      <button class="gallery-filter" aria-pressed="false" data-filter="friends">Friends</button>
      <button class="gallery-filter" aria-pressed="false" data-filter="djs">DJ's</button>
    </div>
  </section>

  <aside>
    <div class="gallery-grid">
      <figure class="gallery-tile" data-cat="spotted">
        <picture><source srcset="assets/real/cu-crowd.webp" type="image/webp" /><img src="assets/real/cu-crowd.jpg" alt="CU Boulder crowd packing the dance floor" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="nights">
        <picture><source srcset="assets/real/dancefloor-hands.webp" type="image/webp" /><img src="assets/real/dancefloor-hands.jpg" alt="Packed dance floor with hands in the air" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="friends">
        <picture><source srcset="assets/real/friends-drinks.webp" type="image/webp" /><img src="assets/real/friends-drinks.jpg" alt="Friends posing with drinks at the bar" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="djs">
        <picture><source srcset="assets/real/dj-booth.webp" type="image/webp" /><img src="assets/real/dj-booth.jpg" alt="DJ playing to a packed dance floor" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="nights">
        <picture><source srcset="assets/real/dancefloor-disco.webp" type="image/webp" /><img src="assets/real/dancefloor-disco.jpg" alt="Crowd dancing under disco lighting" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="spotted">
        <picture><source srcset="assets/real/women-group.webp" type="image/webp" /><img src="assets/real/women-group.jpg" alt="A group of friends out together" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="friends">
        <picture><source srcset="assets/real/bartender-serving.webp" type="image/webp" /><img src="assets/real/bartender-serving.jpg" alt="Bartender serving guests at the bar" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="djs">
        <picture><source srcset="assets/real/exterior-line.webp" type="image/webp" /><img src="assets/real/exterior-line.jpg" alt="The Spotted James storefront with a line outside" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
      <figure class="gallery-tile" data-cat="nights">
        <picture><source srcset="assets/real/bartender-redbull.webp" type="image/webp" /><img src="assets/real/bartender-redbull.jpg" alt="Bartender making drinks" loading="lazy" decoding="async" width="511" height="341" /></picture>
      </figure>
    </div>
    <div class="gallery-load">
      <button class="btn" id="loadMore">Load More</button>
    </div>
  </aside>
</main>

<script>
  document.querySelectorAll('.gallery-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gallery-filter').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      const f = btn.dataset.filter;
      document.querySelectorAll('.gallery-tile').forEach(t => {
        t.style.display = (f === 'all' || t.dataset.cat === f) ? '' : 'none';
      });
    });
  });
</script>
