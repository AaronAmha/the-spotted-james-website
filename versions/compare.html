<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Photo Compare — AI vs Real | The Spotted James (internal)</title>
<style>
  :root { --neon:#2EA8FF; --bone:#fff; --smoke:rgba(255,255,255,.6); --ink:#000; --ink2:#0b0e18; --line:rgba(255,255,255,.12); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--bone); font-family:'Inter',system-ui,sans-serif; padding:40px 24px 80px; }
  h1 { font-size:26px; font-weight:600; margin-bottom:6px; }
  .sub { color:var(--smoke); font-size:14px; margin-bottom:32px; max-width:60ch; line-height:1.5; }
  .pair { border:1px solid var(--line); border-radius:8px; margin-bottom:24px; overflow:hidden; background:var(--ink2); }
  .pair__head { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px; }
  .pair__slot { font-size:15px; font-weight:600; letter-spacing:.04em; }
  .pair__where { font-size:12px; color:var(--smoke); }
  .pair__grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--line); }
  @media (max-width:720px){ .pair__grid { grid-template-columns:1fr; } }
  .col { background:var(--ink); position:relative; }
  .col img { width:100%; height:300px; object-fit:cover; display:block; }
  .col__tag { position:absolute; top:10px; left:10px; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:5px 10px; border-radius:4px; }
  .col__tag--ai { background:rgba(255,80,80,.85); color:#fff; }
  .col__tag--real { background:var(--neon); color:#000; }
  .col__name { position:absolute; bottom:0; left:0; right:0; padding:8px 12px; font-size:11px; color:var(--smoke); background:linear-gradient(transparent,rgba(0,0,0,.85)); }
  .legend { display:flex; gap:20px; margin-bottom:28px; font-size:12px; }
  .legend span { display:inline-flex; align-items:center; gap:8px; }
  .dot { width:12px; height:12px; border-radius:3px; }
</style>
</head>
<body>
  <h1>Photo Compare — AI placeholder vs. Real venue photo</h1>
  <p class="sub">Left = the AI/stock placeholder originally used. Right = the real photo currently live in that slot. Tell Aaron which side wins for each — we keep both sets either way.</p>
  <div class="legend">
    <span><span class="dot" style="background:rgba(255,80,80,.85)"></span> AI placeholder (assets/photos)</span>
    <span><span class="dot" style="background:var(--neon)"></span> Real photo (assets/real) — currently live</span>
  </div>

  <!-- pairs injected below -->
  <div id="pairs"></div>

  <script>
    const pairs = [
      { slot: "HERO (home + parties share image)", where: "Home hero, OG share image", ai: "hero-crowd", real: "dancefloor-hands" },
      { slot: "DJ", where: "Home collage, Events Friday card", ai: "dj", real: "dj-booth" },
      { slot: "DANCE FLOOR", where: "Events Thursday card, gallery", ai: "dance-floor", real: "dancefloor-disco" },
      { slot: "FRIENDS / CHEERS", where: "Home collage, gallery", ai: "cheers", real: "friends-drinks" },
      { slot: "GROUP OF WOMEN", where: "Home collage, parties occasions, gallery", ai: "women-sparkler", real: "women-group" },
      { slot: "WALL SIGN / CU CROWD", where: "Spotted-of-week, parties occasions", ai: "wall-sign", real: "cu-crowd" },
      { slot: "BARTENDER", where: "Drinks hero", ai: "bartender", real: "bartender-redbull" },
      { slot: "BAR BACK", where: "About hero, gallery", ai: "bar-back", real: "bartender-serving" },
      { slot: "STOREFRONT", where: "Directions, gallery", ai: "storefront", real: "exterior-line" },
    ];
    const root = document.getElementById('pairs');
    root.innerHTML = pairs.map(p => `
      <div class="pair">
        <div class="pair__head">
          <span class="pair__slot">${p.slot}</span>
          <span class="pair__where">Used on: ${p.where}</span>
        </div>
        <div class="pair__grid">
          <div class="col">
            <span class="col__tag col__tag--ai">AI</span>
            <img src="../assets/photos/${p.ai}.jpg" alt="${p.ai}" loading="lazy" />
            <span class="col__name">assets/photos/${p.ai}.jpg</span>
          </div>
          <div class="col">
            <span class="col__tag col__tag--real">Real · live</span>
            <img src="../assets/real/${p.real}.jpg" alt="${p.real}" loading="lazy" />
            <span class="col__name">assets/real/${p.real}.jpg</span>
          </div>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
